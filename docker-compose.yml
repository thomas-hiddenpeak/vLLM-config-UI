version: '3.8'

# ============================================
# vLLM 配置生成器 - Docker Compose 配置
# ============================================

services:
  # ---------- 前端服务 ----------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-builder
    volumes:
      - ./dist:/app/frontend/dist
    command: npm run build
    profiles:
      - build

  # ---------- 后端服务 ----------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vllm-config-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 模型缓存目录（可选，持久化缓存）
      - modelscope-cache:/home/appuser/.cache/modelscope
      - huggingface-cache:/home/appuser/.cache/huggingface
    environment:
      # 环境变量配置
      - MODELSCOPE_CACHE=/home/appuser/.cache/modelscope
      - HF_HOME=/home/appuser/.cache/huggingface
      # 日志级别
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vllm-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------- Nginx 反向代理（可选） ----------
  nginx:
    image: nginx:alpine
    container_name: vllm-config-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书（可选）
    depends_on:
      - backend
    networks:
      - vllm-network
    profiles:
      - production

# ---------- 数据卷 ----------
volumes:
  modelscope-cache:
    driver: local
    name: vllm-modelscope-cache
  huggingface-cache:
    driver: local
    name: vllm-huggingface-cache

# ---------- 网络 ----------
networks:
  vllm-network:
    driver: bridge
    name: vllm-config-network
